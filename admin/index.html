<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skateable Admin</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

      :root {
        --bg:       #1A1A1A;
        --s1:       #1A1A1A;
        --s2:       #2A2A2A;
        --s3:       #333333;
        --b1:       rgba(255,255,255,0.12);
        --b2:       rgba(255,255,255,0.2);
        --b3:       rgba(255,255,255,0.3);
        --text:     #FFFFFF;
        --dim:      #A0A0A0;
        --muted:    rgba(255,255,255,0.25);
        --accent:   #3B82F6;
        --adim:     rgba(59,130,246,0.12);
        --green:    #22c55e;
        --red:      #B91C1C;
        --blue:     #3B82F6;
        --amber:    #f59e0b;
        --mono:     'Inter', -apple-system, sans-serif;
        --sans:     'Inter', -apple-system, sans-serif;
        --display:  'Inter', -apple-system, sans-serif;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* ── Header ────────────────────────────────────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
        height: 52px;
        background: var(--s1);
        border-bottom: 1px solid var(--b1);
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .header-brand { display: flex; align-items: center; gap: 10px; }
      .header-logo  { width: 24px; height: 24px; border-radius: 8px; }

      header h1 {
        font-family: var(--sans);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text);
      }

      /* ── Login ─────────────────────────────────────────────────────────────── */
      #login {
        max-width: 320px;
        margin: 96px auto;
        padding: 0 24px;
      }

      #login h2 {
        font-family: var(--sans);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 32px;
        color: var(--text);
      }

      label {
        display: block;
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 9px 11px;
        background: var(--s2);
        border: 1px solid var(--b2);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--sans);
        font-size: 13px;
        outline: none;
        transition: border-color 0.12s;
      }

      input:focus { border-color: var(--accent); }
      .field { margin-bottom: 14px; }

      /* ── Buttons ───────────────────────────────────────────────────────────── */
      button {
        padding: 8px 14px;
        border: none;
        border-radius: 8px;
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        cursor: pointer;
        transition: opacity 0.12s, transform 0.08s;
        min-height: 34px;
      }

      button:hover  { opacity: 0.8; }
      button:active { transform: scale(0.97); }
      button:disabled { opacity: 0.3; cursor: default; transform: none; }

      .btn-primary { background: var(--accent); color: #fff; }
      .btn-approve { background: var(--green);  color: #000; }
      .btn-reject  { background: var(--red);    color: #fff; }
      .btn-delete  { background: var(--red);    color: #fff; }
      .btn-edit    { background: var(--s3); color: var(--text); border: 1px solid var(--b2); }
      .btn-save    { background: var(--green);  color: #000; }
      .btn-cancel  { background: transparent; color: var(--dim); border: 1px solid var(--b1); }
      .btn-logout  {
        background: transparent;
        color: var(--dim);
        border: 1px solid var(--b2);
        font-size: 10px;
        padding: 5px 11px;
        min-height: 28px;
      }

      /* ── Main layout ───────────────────────────────────────────────────────── */
      #main { max-width: 1060px; margin: 0 auto; padding: 40px 24px; }

      /* ── Summary bar ───────────────────────────────────────────────────────── */
      .summary-bar {
        display: flex;
        flex-wrap: wrap;
        margin-bottom: 52px;
        border: 1px solid var(--b1);
        border-radius: 8px;
        overflow: hidden;
        background: var(--b1); /* gap colour */
        gap: 1px;
      }

      .summary-chip {
        background: var(--s1);
        padding: 18px 22px;
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--dim);
        flex: 1;
        min-width: 110px;
        cursor: default;
        transition: background 0.1s;
      }

      .summary-chip[data-target-section] { cursor: pointer; }

      .summary-chip[data-target-section]:hover {
        background: var(--s2);
      }

      .summary-count {
        font-family: var(--mono);
        font-size: 30px;
        font-weight: 700;
        color: var(--text);
        display: block;
        margin-bottom: 4px;
        line-height: 1;
        letter-spacing: -1px;
      }

      .summary-count.loading { color: var(--muted); }
      .summary-count.nonzero { color: var(--accent); }

      /* ── Section badges ────────────────────────────────────────────────────── */
      .section-badge {
        display: none;
        background: var(--accent);
        color: #fff;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        padding: 1px 5px;
        border-radius: 3px;
        margin-left: 8px;
        vertical-align: middle;
        letter-spacing: 0;
      }

      .section-badge.visible { display: inline; }

      /* ── Sections ──────────────────────────────────────────────────────────── */
      section { border-bottom: 1px solid var(--b1); }

      section h2 {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--dim);
        margin-bottom: 0;
        font-weight: 600;
      }

      section details > summary {
        cursor: pointer;
        list-style: none;
        user-select: none;
        display: flex;
        align-items: center;
        padding: 18px 0;
        transition: background 0.1s;
      }

      section details > summary::-webkit-details-marker { display: none; }
      section details > summary h2 { flex: 1; transition: color 0.1s; }
      section details > summary:hover h2 { color: var(--text); }

      section details[open] > summary {
        padding-bottom: 20px;
        margin-bottom: 0;
      }

      section details[open] > summary h2 { color: var(--text); }

      section details[open] { padding-bottom: 36px; }

      .section-caret {
        color: var(--muted);
        font-size: 8px;
        margin-left: 10px;
        transition: transform 0.15s, color 0.15s;
        display: inline-block;
        font-family: monospace;
      }

      section details[open] .section-caret {
        transform: rotate(90deg);
        color: var(--dim);
      }

      /* ── Photo grid ────────────────────────────────────────────────────────── */
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 10px;
      }

      .photo-card {
        background: var(--s1);
        border: 1px solid var(--b1);
        border-radius: 8px;
        overflow: hidden;
      }

      .photo-card img {
        width: 100%;
        aspect-ratio: 4/3;
        object-fit: cover;
        display: block;
        background: var(--s2);
      }

      .photo-card-body { padding: 12px; }

      .photo-card-park { font-size: 13px; font-weight: 600; margin-bottom: 5px; }

      .photo-card-meta {
        font-size: 11px;
        color: var(--dim);
        margin-bottom: 10px;
        line-height: 1.7;
      }

      .photo-card-tag {
        display: inline-block;
        background: var(--s3);
        color: var(--dim);
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 3px;
        margin-right: 3px;
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .photo-card-actions { display: flex; gap: 6px; }
      .photo-card-actions button { flex: 1; }

      /* ── Flag badge ────────────────────────────────────────────────────────── */
      .flag-badge {
        display: inline-block;
        background: rgba(239,68,68,0.12);
        color: #f87171;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 700;
        padding: 2px 6px;
        border-radius: 3px;
        margin-left: 7px;
        vertical-align: middle;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* ── Tables ────────────────────────────────────────────────────────────── */
      .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

      table { width: 100%; border-collapse: collapse; min-width: 480px; }

      th {
        text-align: left;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        color: var(--dim);
        padding: 0 12px 9px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-bottom: 1px solid var(--b2);
      }

      td {
        padding: 10px 12px;
        font-size: 13px;
        border-bottom: 1px solid var(--b1);
        vertical-align: middle;
        color: var(--text);
      }

      tr:last-child td { border-bottom: none; }
      tr:hover td { background: var(--s2); }

      td input { width: 100%; padding: 6px 8px; }

      .park-actions { display: flex; gap: 5px; flex-wrap: wrap; }
      .park-actions button { padding: 5px 10px; font-size: 10px; min-height: 28px; }

      /* ── Duplicate pairs ───────────────────────────────────────────────────── */
      .dup-list { display: flex; flex-direction: column; gap: 8px; }

      .dup-card {
        background: var(--s1);
        border: 1px solid var(--b2);
        border-radius: 8px;
        padding: 14px;
      }

      .dup-parks {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }

      .dup-park {
        background: var(--bg);
        border: 1px solid var(--b1);
        border-radius: 8px;
        padding: 10px 12px;
      }

      .dup-park-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }

      .dup-park-coords {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
      }

      .dup-footer { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }

      .dup-distance {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
        margin-right: auto;
      }

      .dup-footer button { padding: 5px 11px; min-height: 28px; }

      /* ── Parking edit ──────────────────────────────────────────────────────── */
      .parking-edit-cell { padding: 14px 12px !important; }

      .parking-edit-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 16px;
      }

      .parking-edit-grid .field { margin-bottom: 0; }
      .parking-edit-full { grid-column: 1 / -1; }
      .parking-dim { color: var(--muted); font-style: italic; }

      /* ── Recently updated ──────────────────────────────────────────────────── */
      .recent-list { display: flex; flex-direction: column; gap: 2px; }

      .recent-card {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        transition: background 0.1s;
      }

      .recent-card:hover { background: var(--s2); }

      .recent-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }

      .recent-meta {
        font-size: 11px;
        color: var(--dim);
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        align-items: center;
      }

      .recent-tag {
        background: var(--s3);
        color: #666;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .recent-tag.parking { color: var(--blue); background: rgba(91,156,246,0.1); }
      .recent-tag.warn { color: var(--amber); background: rgba(245,158,11,0.1); }

      .recent-card { cursor: pointer; }

      /* ── Park detail panel ─────────────────────────────────────────────────── */
      .detail-panel {
        background: var(--s2);
        border: 1px solid var(--b1);
        border-radius: 8px;
        padding: 14px 16px;
        margin: 0 0 4px;
      }

      .park-detail { display: flex; flex-direction: column; gap: 8px; }

      .detail-row {
        display: flex;
        gap: 10px;
        align-items: baseline;
        font-size: 12px;
        line-height: 1.5;
      }

      .detail-label {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        min-width: 70px;
        flex-shrink: 0;
      }

      .detail-tags { display: flex; flex-wrap: wrap; gap: 4px; }

      .detail-prop {
        display: inline-block;
        background: var(--s3);
        border-radius: 3px;
        padding: 2px 7px;
        font-size: 11px;
        color: var(--text);
      }

      .detail-prop-label {
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-right: 4px;
      }

      .detail-tag {
        display: inline-block;
        background: var(--s3);
        color: var(--dim);
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .detail-tag-warn {
        background: rgba(245,158,11,0.12);
        color: var(--amber);
      }

      .detail-dim {
        font-size: 11px;
        color: var(--muted);
        font-style: italic;
      }

      .btn-detail {
        background: transparent;
        color: var(--accent);
        border: none;
        font-family: var(--mono);
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 2px 4px;
        min-height: auto;
        cursor: pointer;
        vertical-align: middle;
        margin-left: 6px;
      }

      .btn-detail:hover { text-decoration: underline; }

      .recent-time {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--muted);
        white-space: nowrap;
      }

      .parking-map-link {
        display: inline-block;
        margin-left: 5px;
        font-size: 10px;
        color: var(--blue);
        text-decoration: none;
        vertical-align: middle;
      }
      .parking-map-link:hover { text-decoration: underline; }

      /* ── States ────────────────────────────────────────────────────────────── */
      .empty {
        font-family: var(--mono);
        color: var(--muted);
        font-size: 11px;
        padding: 24px 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .error { color: var(--red); font-size: 13px; margin-top: 10px; }

      .loading {
        font-family: var(--mono);
        color: var(--muted);
        font-size: 11px;
        padding: 20px 0;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* ── Pagination ────────────────────────────────────────────────────────── */
      .pagination { display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

      .page-info {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--dim);
      }

      /* ── Mobile ────────────────────────────────────────────────────────────── */
      @media (max-width: 600px) {
        header { padding: 0 16px; }
        header h1 { font-size: 18px; }
        #main { padding: 24px 16px; }
        .dup-parks { grid-template-columns: 1fr; }
        .photo-grid { grid-template-columns: 1fr; }
        .pagination button { flex: 1; }
        .parking-edit-grid { grid-template-columns: 1fr; }

        .table-scroll { overflow-x: visible; }
        table { min-width: 0; display: block; }
        table thead { display: none; }
        table tbody { display: flex; flex-direction: column; gap: 4px; }
        table tr {
          display: grid;
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto;
          background: var(--s1);
          border: 1px solid var(--b1);
          border-radius: 8px;
          padding: 10px;
        }
        table tr:hover td { background: transparent; }
        table td { padding: 0; border-bottom: none; font-size: 12px; }
        table td:first-child { font-weight: 600; grid-column: 1; grid-row: 1; padding-bottom: 3px; }
        table td:nth-child(2) { font-size: 11px; color: var(--dim); grid-column: 1; grid-row: 2; }
        table td:nth-child(3) { display: none; }
        table td:last-child { grid-column: 2; grid-row: 1 / 3; display: flex; align-items: center; }
        .park-actions { flex-direction: column; gap: 4px; }
        .park-actions button { min-height: 28px; }

        table tr.detail-row { display: none; padding: 0; border: none; background: transparent; }
        table tr.detail-row td { display: block; width: 100%; padding: 0; }

        table tr.editing-row { display: flex; flex-direction: column; gap: 8px; padding: 10px; }
        table tr.editing-row td { display: block; width: 100%; padding: 0; }
        table tr.editing-row td:nth-child(3) { display: block; }

        table tr.parking-editing-row { display: flex; flex-direction: column; gap: 0; padding: 0; border-radius: 8px; background: var(--s1); overflow: hidden; }
        table tr.parking-editing-row td { display: block; width: 100%; padding: 0; border: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script type="module">
      // ─── Config ───────────────────────────────────────────────────────────────
      const SUPABASE_URL = 'https://syscazwyemlsyiuelwhj.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_FOHAV9G4G07u7dluamu7ig_KJ5si4X7';

      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
      import leoProfanity from 'https://esm.sh/leo-profanity';
      leoProfanity.loadDictionary('en');

      const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const PARKS_PER_PAGE = 25;

      const PARK_TYPE_LABELS = {
        skatepark: 'Skatepark', spot: 'Spot', diy: 'DIY', ramp: 'Ramp',
      };
      const SURFACE_LABELS = {
        modern_smooth: 'Smooth concrete', old_concrete: 'Old concrete', rough_asphalt: 'Rough asphalt',
        timber: 'Timber/Wood', indoor: 'Indoor', steel: 'Steel', other: 'Other',
      };
      const DRAINAGE_LABELS = { good: 'Good drainage', average: 'Avg drainage', poor: 'Poor drainage' };
      const SUN_LABELS = { direct_sun: 'Full sun', partial_sun: 'Partial sun', full_shade: 'Full shade' };
      const FEATURE_LABELS = {
        stairs: 'Stairs', ledges: 'Ledges', rail: 'Rail', hubba: 'Hubba',
        flat_bank: 'Flat bank', manual_pad: 'Manual pad', flat_ground: 'Flat ground',
        transition: 'Transition', bowl: 'Bowl', slappy_curbs: 'Slappy curbs',
        gaps: 'Gaps', wallrides: 'Wallrides', kicker: 'Kicker', funbox: 'Funbox',
        quarter_pipe: 'Quarter pipe', half_pipe: 'Half pipe', bump_to_bar: 'Bump to bar',
        euro_gap: 'Euro gap', ramp_under_4ft: 'Ramp <4ft', ramp_over_4ft: 'Ramp >4ft', vert: 'Vert',
      };
      const WARNING_LABELS = {
        high_snake_risk: 'High snake risk', unsupervised_groms: 'Unsupervised groms',
        bmx_conflict: 'BMX conflict', pebble_hazard: 'Pebble hazard', no_parking: 'No parking',
      };
      const DUPLICATE_THRESHOLD_METERS = 300;

      let currentUser = null;
      let parksPage = 0;

      // Stores full park record while a parking row is in edit mode
      const parkingRowData = new Map();

      // ─── Auth ────────────────────────────────────────────────────────────────

      async function login(email, password) {
        const { data, error } = await db.auth.signInWithPassword({ email, password });
        if (error) throw error;
        return data.user;
      }

      async function logout() {
        await db.auth.signOut();
        currentUser = null;
        render();
      }

      // ─── Photos ──────────────────────────────────────────────────────────────

      async function loadPendingPhotos() {
        const { data, error } = await db
          .from('park_photos')
          .select('id, park_id, storage_path, created_at, parks(name, latitude, longitude, attributes)')
          .eq('approved', false)
          .eq('reviewed', false)
          .order('created_at', { ascending: true })
          .limit(100);
        if (error) throw error;
        return data;
      }

      async function approvePhoto(id) {
        const { error } = await db
          .from('park_photos')
          .update({ approved: true, reviewed: true })
          .eq('id', id);
        if (error) throw error;
      }

      async function rejectPhoto(id, storagePath) {
        const { error: storageError } = await db.storage
          .from('park-photos')
          .remove([storagePath]);
        if (storageError) throw storageError;
        const { error: dbError } = await db
          .from('park_photos')
          .update({ approved: false, reviewed: true })
          .eq('id', id);
        if (dbError) throw dbError;
      }

      // ─── Parks ───────────────────────────────────────────────────────────────

      async function loadParks(page = 0) {
        const from = page * PARKS_PER_PAGE;
        const to = from + PARKS_PER_PAGE - 1;
        const { data, error, count } = await db
          .from('parks')
          .select('id, name, latitude, longitude, attributes, created_at', { count: 'exact' })
          .order('created_at', { ascending: false })
          .range(from, to);
        if (error) throw error;
        return { data, count };
      }

      async function loadFlaggedNames() {
        const { data, error } = await db
          .from('parks')
          .select('id, name, latitude, longitude')
          .eq('name_reviewed', false);
        if (error) throw error;
        return data.filter(p => leoProfanity.check(p.name));
      }

      // ─── Park flags ──────────────────────────────────────────────────────

      const flagRowData = new Map();

      async function loadParkFlags() {
        const { data, error } = await db
          .from('park_flags')

      async function updateFlagReason(id, reason, category) {
        const trimmed = reason.trim();
        if (trimmed.length < 5 || trimmed.length > 200)
          throw new Error('Reason must be between 5 and 200 characters');
        const update = { reason: trimmed };
        if (category !== undefined) update.category = category || null;
        const { error } = await db
          .from('park_flags')
          .update(update)
          .eq('id', id);
        if (error) throw error;
      }

      const CATEGORY_LABELS = {
        wrong_location: 'Wrong Location',
        permanently_closed: 'Permanently Closed',
        dangerous_conditions: 'Dangerous Conditions',
        duplicate_listing: 'Duplicate Listing',
        inappropriate_content: 'Inappropriate Content',
        other: 'Other',
      };

      const CATEGORY_COLORS = {
        wrong_location: { bg: 'rgba(59,130,246,0.12)', fg: 'var(--blue)' },
        permanently_closed: { bg: 'rgba(185,28,28,0.12)', fg: 'var(--red)' },
        dangerous_conditions: { bg: 'rgba(245,158,11,0.15)', fg: 'var(--amber)' },
        duplicate_listing: { bg: 'rgba(160,160,160,0.15)', fg: 'var(--dim)' },
        inappropriate_content: { bg: 'rgba(185,28,28,0.12)', fg: 'var(--red)' },
        other: { bg: 'rgba(160,160,160,0.15)', fg: 'var(--dim)' },
      };

      function isParkingFlag(f) {
        return f.category === 'wrong_location' || (f.category == null && f.reason.startsWith('[Parking'));
      }

      function categoryBadge(category) {
        if (!category) return '';
        const label = CATEGORY_LABELS[category] ?? category;
        const color = CATEGORY_COLORS[category] ?? { bg: 'rgba(160,160,160,0.15)', fg: 'var(--dim)' };
        return ` <span class="flag-badge" style="background:${color.bg};color:${color.fg}">${escHtml(label)}</span>`;
      }

      function categorySelectHtml(selected) {
        const opts = Object.entries(CATEGORY_LABELS)
          .map(([v, l]) => `<option value="${v}"${v === selected ? ' selected' : ''}>${escHtml(l)}</option>`)
          .join('');
        return `<select id="edit-flag-category-${Date.now()}" class="flag-category-select" style="background:var(--s1);color:var(--text);border:1px solid var(--b2);border-radius:6px;padding:6px 8px;font-family:var(--sans);font-size:13px;width:100%"><option value="">-- No category --</option>${opts}</select>`;
      }

      function parseParkingSuggestion(reason) {
        const m = reason.match(/^\[Parking:([-\d.]+),([-\d.]+)\]\s*(.*)/);
        if (!m) return null;
        const lat = parseFloat(m[1]);
        const lon = parseFloat(m[2]);
        if (isNaN(lat) || isNaN(lon)) return null;
        const detail = m[3] || '';
        return { lat, lon, detail };
      }

      function renderFlagRow(f, editing = false) {
        const parkName = f.parks?.name ?? 'Unknown park';
        const updated = timeAgo(new Date(f.updated_at));
        const isParking = isParkingFlag(f);
        const approvedBadge = f.approved
          ? '<span class="flag-badge" style="background:rgba(34,197,94,0.15);color:var(--green)">approved</span>'
          : '<span class="flag-badge" style="background:rgba(245,158,11,0.15);color:var(--amber)">pending</span>';
        const catBadge = categoryBadge(f.category);
        const parkingBadge = isParking && !f.category
          ? ' <span class="flag-badge" style="background:rgba(59,130,246,0.12);color:var(--blue)">parking</span>'
          : '';

        if (editing) {
          return `
            <tr id="flag-row-${f.id}" class="editing-row">
              <td colspan="6" style="padding:16px">
                <div style="font-size:13px;font-weight:600;color:var(--dim);margin-bottom:12px">
                  ${escHtml(parkName)}
                </div>
                <div class="field" style="margin-bottom:12px">
                  <label>Category</label>
                  <select id="edit-flag-category-${f.id}"
                    style="background:var(--s1);color:var(--text);border:1px solid var(--b2);border-radius:6px;padding:6px 8px;font-family:var(--sans);font-size:13px;width:100%">
                    <option value="">-- No category --</option>
                    ${Object.entries(CATEGORY_LABELS).map(([v, l]) =>
                      `<option value="${v}"${v === f.category ? ' selected' : ''}>${escHtml(l)}</option>`
                    ).join('')}
                  </select>
                </div>
                <div class="field" style="margin-bottom:12px">
                  <label>Reason <span style="color:var(--dim);font-weight:400">(5–200 chars)</span></label>
                  <textarea id="edit-flag-reason-${f.id}" rows="3" maxlength="200"
                    style="width:100%;resize:vertical;background:var(--s1);color:var(--text);border:1px solid var(--b2);border-radius:6px;padding:8px;font-family:var(--sans);font-size:13px"
                  >${escHtml(f.reason)}</textarea>
                </div>
                <div class="park-actions">
                  <button class="btn-save" data-action="save-flag" data-id="${f.id}">Save</button>
                  <button class="btn-cancel" data-action="cancel-flag" data-id="${f.id}">Cancel</button>
                </div>
                <div id="flag-error-${f.id}" class="error"></div>
              </td>
            </tr>
          `;
        }

        const hasPark = f.parks?.id != null;
        const hasParking = f.parks?.attributes?.parkingLocation != null;
        const suggestion = isParking ? parseParkingSuggestion(f.reason) : null;
        const viewBtn = hasPark
          ? `<button class="btn-detail" data-action="toggle-detail" data-park-id="flag-${f.id}">View park</button>`
          : '';
        const detailHtml = hasPark
          ? `<tr id="detail-row-flag-${f.id}" class="detail-row" style="display:none"><td colspan="6" style="padding:0;border:none"><div class="detail-panel" id="detail-flag-${f.id}" style="display:block">${renderParkDetail(f.parks)}</div></td></tr>`
          : '';

          ? `<button class="btn-delete" data-action="flag-remove-parking" data-id="${f.id}" data-park-id="${f.parks.id}">Remove parking</button>`
          : '';

        const applyParkingBtn = suggestion != null && hasPark
          ? `<button class="btn-approve" data-action="flag-apply-parking" data-id="${f.id}" data-park-id="${f.parks.id}" data-lat="${suggestion.lat}" data-lon="${suggestion.lon}">Apply suggestion</button>`
          : '';

        if (suggestion != null) {
          const mapUrl = `https://www.google.com/maps/search/?api=1&query=${suggestion.lat},${suggestion.lon}`;
          reasonHtml = `<span style="color:var(--blue)">${suggestion.lat.toFixed(6)}, ${suggestion.lon.toFixed(6)}</span>`
            + ` <a class="parking-map-link" href="${mapUrl}" target="_blank" rel="noopener">&#8599; map</a>`;
          if (suggestion.detail) reasonHtml += `<br><span style="color:var(--dim);font-size:12px">${escHtml(suggestion.detail)}</span>`;
        }

        return `
          <tr id="flag-row-${f.id}">

                ${applyParkingBtn}

                  ? `<button class="btn-cancel" data-action="unapprove-flag" data-id="${f.id}">Unapprove</button>`
                  : `<button class="btn-approve" data-action="approve-flag" data-id="${f.id}">Approve</button>`}
                <button class="btn-edit" data-action="edit-flag" data-id="${f.id}">Edit</button>

          .from('parks')
          .update({ name: name.trim(), latitude: lat, longitude: lng })

      async function fetchParkDetail(id) {
        const { data, error } = await db
          .from('parks')
          .select('id, name, latitude, longitude, attributes, created_at, updated_at')
          .eq('id', id)

      function renderParkDetail(park) {
        const attrs = park.attributes ?? {};
        const lat = typeof park.latitude === 'number' ? park.latitude.toFixed(5) : '—';
        const lng = typeof park.longitude === 'number' ? park.longitude.toFixed(5) : '—';
        const mapsUrl = (typeof park.latitude === 'number' && typeof park.longitude === 'number')
          ? `https://www.google.com/maps?q=${park.latitude},${park.longitude}`
          : null;
        const coordsHtml = mapsUrl
          ? `${lat}, ${lng} <a class="parking-map-link" href="${mapsUrl}" target="_blank" rel="noopener">↗ map</a>`
          : `${lat}, ${lng}`;

        const props = [
          { label: 'Type', value: PARK_TYPE_LABELS[attrs.parkType] ?? null },
          { label: 'Surface', value: SURFACE_LABELS[attrs.surfaceType] ?? attrs.surfaceType ?? null },
          { label: 'Sun', value: SUN_LABELS[attrs.sunExposure] ?? attrs.sunExposure ?? null },
          { label: 'Drainage', value: DRAINAGE_LABELS[attrs.drainageQuality] ?? attrs.drainageQuality ?? null },
        ].filter(p => p.value);
        const propsHtml = props.length > 0
          ? props.map(p => `<span class="detail-prop"><span class="detail-prop-label">${p.label}</span> ${escHtml(p.value)}</span>`).join('')
          : '<span class="detail-dim">No attributes</span>';

        const features = (attrs.features ?? []).map(f => FEATURE_LABELS[f] ?? f);
        const featuresHtml = features.length > 0
          ? features.map(f => `<span class="detail-tag">${escHtml(f)}</span>`).join('')
          : '<span class="detail-dim">None</span>';

        const warnings = (attrs.warnings ?? []).map(w => WARNING_LABELS[w] ?? w);
        const warningsHtml = warnings.length > 0
          ? warnings.map(w => `<span class="detail-tag detail-tag-warn">${escHtml(w)}</span>`).join('')
          : '<span class="detail-dim">None</span>';

        const pl = attrs.parkingLocation;
        let parkingHtml = '<span class="detail-dim">None</span>';
        if (pl) {
          const plat = typeof pl.latitude === 'number' ? pl.latitude.toFixed(5) : '—';
          const plng = typeof pl.longitude === 'number' ? pl.longitude.toFixed(5) : '—';
          const parts = [`${plat}, ${plng}`];
          if (pl.address) parts.push(escHtml(pl.address));
          if (pl.notes) parts.push(`<em>${escHtml(pl.notes)}</em>`);
          parkingHtml = parts.join(' · ');
        }

        return `
          <div class="park-detail">
            <div class="detail-row">
              <span class="detail-label">Coords</span>
              <span>${coordsHtml}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Attributes</span>
              <span class="detail-tags">${propsHtml}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Features</span>
              <span class="detail-tags">${featuresHtml}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Warnings</span>
              <span class="detail-tags">${warningsHtml}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Parking</span>
              <span>${parkingHtml}</span>
            </div>
          </div>

      function renderRecentlyUpdated(parks) {
        if (parks.length === 0) return '<p class="empty">No parks yet.</p>';
        const cards = parks.map(p => {
          const attrs = p.attributes ?? {};
          const updatedAt = new Date(p.updated_at);
          const createdAt = new Date(p.created_at);
          const wasEdited = Math.abs(updatedAt - createdAt) > 5000;
          const relTime = timeAgo(updatedAt);

          const tags = [];
          if (attrs.parkType) tags.push({ label: PARK_TYPE_LABELS[attrs.parkType] ?? attrs.parkType, cls: '' });
          if (attrs.surfaceType) tags.push({ label: SURFACE_LABELS[attrs.surfaceType] ?? attrs.surfaceType, cls: '' });
          if (attrs.sunExposure) tags.push({ label: SUN_LABELS[attrs.sunExposure] ?? attrs.sunExposure, cls: '' });
          if (attrs.drainageQuality) tags.push({ label: DRAINAGE_LABELS[attrs.drainageQuality] ?? attrs.drainageQuality, cls: '' });
          if ((attrs.features ?? []).length > 0) tags.push({ label: `${attrs.features.length} features`, cls: '' });
          if ((attrs.warnings ?? []).length > 0) tags.push({ label: `${attrs.warnings.length} warnings`, cls: 'warn' });
          if (attrs.parkingLocation) tags.push({ label: 'Parking', cls: 'parking' });
          const tagHtml = tags.map(t =>
            `<span class="recent-tag ${t.cls}">${escHtml(t.label)}</span>`
          ).join('');

          return `
            <div class="recent-card" data-action="toggle-detail" data-park-id="${p.id}">
              <div>
                <div class="recent-name">${escHtml(p.name)}</div>
                <div class="recent-meta">

                  ${wasEdited ? '<span style="color:var(--dim)">edited</span>' : '<span style="color:var(--dim)">created</span>'}

        }).join('');
        return `<div class="recent-list">${cards}</div>`;

      function timeAgo(date) {
        const seconds = Math.floor((Date.now() - date) / 1000);
        if (seconds < 60) return 'just now';
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}h ago`;
        const days = Math.floor(hours / 24);
        if (days < 7) return `${days}d ago`;
        return date.toLocaleDateString();
      }

      async function saveParkingLocation(id, fullAttrs, parking) {
        const plat = parseFloat(parking.latitude);
        const plng = parseFloat(parking.longitude);
        if (isNaN(plat) || plat < -90 || plat > 90)
          throw new Error('Parking latitude must be between -90 and 90');
        if (isNaN(plng) || plng < -180 || plng > 180)
          throw new Error('Parking longitude must be between -180 and 180');
        const updated = {
          ...fullAttrs,
          parkingLocation: {
            latitude: plat,
            longitude: plng,
            ...(parking.address?.trim() ? { address: parking.address.trim() } : {}),
            ...(parking.notes?.trim() ? { notes: parking.notes.trim() } : {}),
          },
        };
        const { error } = await db.from('parks').update({ attributes: updated }).eq('id', id);
        if (error) throw error;
      }

        if (error) throw error;
      }

      // ─── Duplicates ──────────────────────────────────────────────────────────

      function haversineMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const φ1 = lat1 * Math.PI / 180;
        const φ2 = lat2 * Math.PI / 180;
        const Δφ = (lat2 - lat1) * Math.PI / 180;
        const Δλ = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(Δφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      async function loadDuplicateCandidates() {
        const { data, error } = await db
          .from('parks')
          .select('id, name, latitude, longitude, attributes')
          .eq('duplicate_reviewed', false);
        if (error) throw error;
        const pairs = [];
        for (let i = 0; i < data.length; i++) {
          for (let j = i + 1; j < data.length; j++) {
            const dist = haversineMeters(
              data[i].latitude, data[i].longitude,
              data[j].latitude, data[j].longitude
            );
            if (dist <= DUPLICATE_THRESHOLD_METERS) {
              pairs.push({ a: data[i], b: data[j], distanceMeters: Math.round(dist) });
            }
          }
        }
        return pairs;
      }

      async function markDuplicateReviewed(idA, idB) {
        const { error } = await db
          .from('parks')
          .update({ duplicate_reviewed: true })
          .in('id', [idA, idB]);

                flagged names
              </div>
              <div class="summary-chip" id="summary-flags" data-target-section="details-flags">
                <span class="summary-count loading">—</span>
                park flags
              </div>
              <div class="summary-chip" id="summary-sessions" data-target-section="details-sessions">
                <span class="summary-count loading">—</span>
                recent sessions
              </div>
            </div>
            <section>
              <details>
                <summary><h2>Recently updated parks <span class="section-caret">▶</span></h2></summary>
                <div id="recent-content" class="loading">Loading…</div>
              </details>
            </section>
            <section>
              <details id="details-sessions">
                <summary><h2>Recent sessions<span class="section-badge" id="badge-sessions"></span> <span class="section-caret">▶</span></h2></summary>
                <div id="sessions-content" class="loading">Loading…</div>
              </details>
            </section>
            <section>
              <details id="details-photos">
                <summary><h2>Photos to review<span class="section-badge" id="badge-photos"></span> <span class="section-caret">▶</span></h2></summary>
                <div id="photos-content" class="loading">Loading…</div>
              </details>
            </section>
            <section>
              <details id="details-duplicates">
                <summary><h2>Potential duplicates<span class="section-badge" id="badge-duplicates"></span> <span class="section-caret">▶</span></h2></summary>
                <div id="duplicates-content" class="loading">Loading…</div>
              </details>
            </section>
            <section>
              <details>
                <summary><h2>Parking locations <span class="section-caret">▶</span></h2></summary>
                <div id="parking-content" class="loading">Loading…</div>
              </details>
            </section>
            <section>
              <details id="details-flags">
                <summary><h2>Park flags<span class="section-badge" id="badge-flags"></span> <span class="section-caret">▶</span></h2></summary>
                <div id="flags-content" class="loading">Loading…</div>
              </details>
            </section>
            <section>
              <details id="details-names">
                <summary><h2>Name review<span class="section-badge" id="badge-names"></span> <span class="section-caret">▶</span></h2></summary>
                <div id="names-content" class="loading">Loading…</div>
              </details>
            </section>
            <section>
              <details>
                <summary><h2>Parks <span class="section-caret">▶</span></h2></summary>
                <div id="parks-content" class="loading">Loading…</div>
              </details>
            </section>
          </div>
        `;
      }

      function renderPhotos(photos) {
        if (photos.length === 0) return '<p class="empty">No pending photos.</p>';
        const cards = photos.map(p => {
          const url = `${SUPABASE_URL}/storage/v1/object/public/park-photos/${p.storage_path}`;
          const park = p.parks ?? {};
          const parkName = park.name ?? 'Unknown park';
          const attrs = park.attributes ?? {};
          const date = new Date(p.created_at).toLocaleDateString();

          const tags = [
            attrs.parkType ? PARK_TYPE_LABELS[attrs.parkType] : null,
            attrs.surfaceType ? SURFACE_LABELS[attrs.surfaceType] : null,
            attrs.sunExposure ? SUN_LABELS[attrs.sunExposure] : null,
            attrs.drainageQuality ? DRAINAGE_LABELS[attrs.drainageQuality] : null,
          ].filter(Boolean).map(t => `<span class="photo-card-tag">${escHtml(t)}</span>`).join('');

          const coords = (park.latitude != null && park.longitude != null)
            ? `<div>${park.latitude.toFixed(4)}, ${park.longitude.toFixed(4)}</div>`
            : '';

          return `
            <div class="photo-card" id="photo-${p.id}">
              <img src="${url}" alt="${escHtml(parkName)}" loading="lazy" />
              <div class="photo-card-body">
                <div class="photo-card-park">${escHtml(parkName)}</div>
                <div class="photo-card-meta">
                  ${tags}
                  ${coords}
                  <div>Submitted ${date}</div>
                </div>
                <div class="photo-card-actions">
                  <button class="btn-approve" data-action="approve" data-id="${p.id}">Approve</button>
                  <button class="btn-reject" data-action="reject" data-id="${p.id}" data-path="${escAttr(p.storage_path)}">Reject</button>
                </div>
              </div>
            </div>
          `;
        }).join('');
        return `<div class="photo-grid">${cards}</div>`;
      }

      function renderDuplicates(pairs) {
        if (pairs.length === 0) return '<p class="empty">No potential duplicates found.</p>';
        const cards = pairs.map(({ a, b, distanceMeters }) => `
          <div class="dup-card" id="dup-${a.id}-${b.id}">
            <div class="dup-parks">
              <div class="dup-park">
                <div class="dup-park-name">${escHtml(a.name)}</div>
                <div class="dup-park-coords">${a.latitude.toFixed(5)}, ${a.longitude.toFixed(5)}</div>
                <button class="btn-detail" data-action="toggle-detail" data-park-id="dup-a-${a.id}-${b.id}">Details</button>
                <div class="detail-panel" id="detail-dup-a-${a.id}-${b.id}" style="display:none">
                  ${renderParkDetail(a)}
                </div>
              </div>
              <div class="dup-park">
                <div class="dup-park-name">${escHtml(b.name)}</div>
                <div class="dup-park-coords">${b.latitude.toFixed(5)}, ${b.longitude.toFixed(5)}</div>
                <button class="btn-detail" data-action="toggle-detail" data-park-id="dup-b-${a.id}-${b.id}">Details</button>
                <div class="detail-panel" id="detail-dup-b-${a.id}-${b.id}" style="display:none">
                  ${renderParkDetail(b)}
                </div>
              </div>
            </div>
            <div class="dup-footer">
              <span class="dup-distance">${distanceMeters}m apart</span>
              <button class="btn-delete" data-action="delete-park"
                data-id="${a.id}" data-dup-pair="${a.id}-${b.id}">Delete ${escHtml(a.name)}</button>
              <button class="btn-delete" data-action="delete-park"
                data-id="${b.id}" data-dup-pair="${a.id}-${b.id}">Delete ${escHtml(b.name)}</button>
              <button class="btn-edit" data-action="not-duplicates"
                data-id-a="${a.id}" data-id-b="${b.id}">Not duplicates</button>
            </div>
          </div>
        `).join('');
        return `<div class="dup-list">${cards}</div>`;
      }

      // ─── Parking render ───────────────────────────────────────────────────────

      function renderParkingSection(parks) {
        if (parks.length === 0) return '<p class="empty">No parking locations recorded yet.</p>';
        const rows = parks.map(p => renderParkingRow(p)).join('');
        return `
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>Park</th>
                  <th>Address</th>
                  <th>Parking coords</th>
                  <th>Notes</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="parking-body">${rows}</tbody>
            </table>
          </div>
        `;
      }

      function renderParkingRow(park, editing = false) {
        const id = park.id;
        const pl = park.attributes?.parkingLocation ?? {};

        if (editing) {
          return `
            <tr id="parking-row-${id}" class="editing-row parking-editing-row">
              <td class="parking-edit-cell" colspan="5">
                <div style="font-size:13px;font-weight:600;color:var(--dim);margin-bottom:12px">
                  ${escHtml(park.name)}
                </div>
                <div class="parking-edit-grid">
                  <div class="field">
                    <label>Parking latitude</label>
                    <input type="number" id="edit-pl-lat-${id}"
                      value="${escAttr(String(pl.latitude ?? ''))}" step="any" placeholder="Latitude" />
                  </div>
                  <div class="field">
                    <label>Parking longitude</label>
                    <input type="number" id="edit-pl-lng-${id}"
                      value="${escAttr(String(pl.longitude ?? ''))}" step="any" placeholder="Longitude" />
                  </div>
                  <div class="field parking-edit-full">
                    <label>Address <span style="color:var(--dim);font-weight:400">(optional)</span></label>
                    <input type="text" id="edit-pl-addr-${id}"
                      value="${escAttr(pl.address ?? '')}" placeholder="e.g. High Street, Bicester" />
                  </div>
                  <div class="field parking-edit-full">
                    <label>Notes <span style="color:var(--dim);font-weight:400">(optional, max 200 chars)</span></label>
                    <input type="text" id="edit-pl-notes-${id}" maxlength="200"
                      value="${escAttr(pl.notes ?? '')}" placeholder="e.g. Free parking on weekends" />
                  </div>
                </div>
                <div class="park-actions" style="margin-top:12px">
                  <button class="btn-save" data-action="save-parking" data-id="${id}">Save</button>
                  <button class="btn-cancel" data-action="cancel-parking" data-id="${id}">Cancel</button>
                </div>
                <div id="parking-error-${id}" class="error"></div>
              </td>
            </tr>
          `;
        }

        const plat = typeof pl.latitude === 'number' ? pl.latitude.toFixed(5) : '—';
        const plng = typeof pl.longitude === 'number' ? pl.longitude.toFixed(5) : '—';
        const mapsUrl = (typeof pl.latitude === 'number' && typeof pl.longitude === 'number')
          ? `https://www.google.com/maps?q=${pl.latitude},${pl.longitude}`
          : null;
        const coordsCell = mapsUrl
          ? `${plat}, ${plng}<a class="parking-map-link" href="${mapsUrl}" target="_blank" rel="noopener">↗ map</a>`
          : `${plat}, ${plng}`;

        return `
          <tr id="parking-row-${id}">
            <td>${escHtml(park.name)}</td>
            <td>${pl.address ? escHtml(pl.address) : '<span class="parking-dim">—</span>'}</td>
            <td>${coordsCell}</td>
            <td>${pl.notes ? escHtml(pl.notes) : '<span class="parking-dim">—</span>'}</td>
            <td>
              <div class="park-actions">
                <button class="btn-edit" data-action="edit-parking" data-id="${id}">Edit</button>
                <button class="btn-delete" data-action="remove-parking" data-id="${id}">Remove</button>
              </div>
            </td>
          </tr>
        `;
      }

      function renderNames(flagged) {
        if (flagged.length === 0) return '<p class="empty">No flagged names.</p>';
        const rows = flagged.map(p => {
          const lat = p.latitude.toFixed(5);
          const lng = p.longitude.toFixed(5);
          return `
            <tr id="name-row-${p.id}">
              <td>${escHtml(p.name)}<span class="flag-badge">profanity</span>
                <button class="btn-detail" data-action="load-detail" data-park-id="${p.id}">View</button>
              </td>
              <td>${lat}</td>
              <td>${lng}</td>
              <td>
                <div class="park-actions">
                  <button class="btn-approve" data-action="accept-name" data-id="${p.id}">Accept</button>
                  <button class="btn-cancel" data-action="dismiss-name" data-id="${p.id}">Dismiss</button>
                  <button class="btn-edit" data-action="edit-park"
                    data-id="${p.id}" data-name="${escAttr(p.name)}"
                    data-lat="${p.latitude}" data-lng="${p.longitude}">Edit</button>
                </div>
              </td>
            </tr>
            <tr id="detail-row-park-${p.id}" class="detail-row" style="display:none">
              <td colspan="4" style="padding:0;border:none">
                <div class="detail-panel" id="detail-park-${p.id}" style="display:block">
                  <span class="detail-dim">Loading…</span>
                </div>
              </td>
            </tr>
          `;
        }).join('');
        return `
          <div class="table-scroll">
            <table>
              <thead><tr><th>Name</th><th>Latitude</th><th>Longitude</th><th></th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }

      function renderParks(parks, page, total) {
        if (parks.length === 0) return '<p class="empty">No parks found.</p>';
        const rows = parks.map(p => renderParkRow(p)).join('');
        const totalPages = Math.ceil(total / PARKS_PER_PAGE);
        const start = page * PARKS_PER_PAGE + 1;
        const end = start + parks.length - 1;
        return `
          <div class="table-scroll">
            <table>
              <thead><tr><th>Name</th><th>Latitude</th><th>Longitude</th><th></th></tr></thead>
              <tbody id="parks-body">${rows}</tbody>
            </table>
          </div>
          <div class="pagination">
            <button class="btn-edit" data-action="parks-prev" ${page === 0 ? 'disabled' : ''}>← Prev</button>
            <span class="page-info">${start}–${end} of ${total}</span>
            <button class="btn-edit" data-action="parks-next" ${page >= totalPages - 1 ? 'disabled' : ''}>Next →</button>
          </div>
        `;
      }

      function renderParkRow(p, editing = false, flagged = false) {
        const id = p.id;
        if (editing) {
          return `
            <tr id="park-row-${id}" class="editing-row">
              <td><input type="text" id="edit-name-${id}" value="${escAttr(p.name)}" placeholder="Name" /></td>
              <td><input type="number" id="edit-lat-${id}" value="${p.latitude}" step="any" placeholder="Latitude" /></td>
              <td><input type="number" id="edit-lng-${id}" value="${p.longitude}" step="any" placeholder="Longitude" /></td>
              <td>
                <div class="park-actions">
                  <button class="btn-save" data-action="save-park" data-id="${id}">Save</button>
                  <button class="btn-cancel" data-action="cancel-park" data-id="${id}">Cancel</button>
                </div>
                <div id="park-error-${id}" class="error"></div>
              </td>
            </tr>
          `;
        }
        const badge = flagged ? '<span class="flag-badge">profanity</span>' : '';
        const lat = typeof p.latitude === 'number' ? p.latitude.toFixed(5) : p.latitude;
        const lng = typeof p.longitude === 'number' ? p.longitude.toFixed(5) : p.longitude;
        const hasAttrs = p.attributes != null;
        const viewBtn = hasAttrs
          ? `<button class="btn-detail" data-action="toggle-detail" data-park-id="park-${id}">View</button>`
          : `<button class="btn-detail" data-action="load-detail" data-park-id="${id}">View</button>`;
        const detailHtml = hasAttrs
          ? `<tr id="detail-row-park-${id}" class="detail-row" style="display:none"><td colspan="4" style="padding:0;border:none"><div class="detail-panel" id="detail-park-${id}" style="display:block">${renderParkDetail(p)}</div></td></tr>`
          : `<tr id="detail-row-park-${id}" class="detail-row" style="display:none"><td colspan="4" style="padding:0;border:none"><div class="detail-panel" id="detail-park-${id}" style="display:block"><span class="detail-dim">Loading…</span></div></td></tr>`;
        return `
          <tr id="park-row-${id}">
            <td>${escHtml(p.name)}${badge} ${viewBtn}</td>
            <td>${lat}</td>
            <td>${lng}</td>
            <td>
              <div class="park-actions">
                <button class="btn-edit" data-action="edit-park"
                  data-id="${id}" data-name="${escAttr(p.name)}"
                  data-lat="${p.latitude}" data-lng="${p.longitude}">Edit</button>
              </div>
            </td>
          </tr>
          ${detailHtml}
        `;
      }

      // ─── Content loaders ─────────────────────────────────────────────────────

      async function loadContent() {
        await Promise.all([
          loadRecentSection(),
          loadSessionsSection(),
          loadPhotosSection(),
          loadDuplicatesSection(),
          loadParkingSection(),
          loadFlagsSection(),
          loadParksAndNamesSection(),
        ]);
      }

      async function loadSessionsSection() {
        const el = document.getElementById('sessions-content');
        if (!el) return;
        try {
          const sessions = await loadRecentSessions();
          el.innerHTML = renderSessions(sessions);
          updateSummaryChip('summary-sessions', sessions.length);
        } catch (err) {
          el.innerHTML = `<p class="error">${escHtml(err.message)}</p>`;
        }
      }

      async function loadRecentSection() {
        const el = document.getElementById('recent-content');
        if (!el) return;
        try {
          el.innerHTML = renderRecentlyUpdated(await loadRecentlyUpdated());
        } catch (err) {
          el.innerHTML = `<p class="error">${escHtml(err.message)}</p>`;
        }
      }

      async function loadPhotosSection() {
        const el = document.getElementById('photos-content');
        if (!el) return;
        try {
          const photos = await loadPendingPhotos();
          el.innerHTML = renderPhotos(photos);
          updateSummaryChip('summary-photos', photos.length);
        } catch (err) {
          el.innerHTML = `<p class="error">${escHtml(err.message)}</p>`;
        }
      }

      async function loadDuplicatesSection() {
        const el = document.getElementById('duplicates-content');
        if (!el) return;
        try {
          const pairs = await loadDuplicateCandidates();
          el.innerHTML = renderDuplicates(pairs);
          updateSummaryChip('summary-duplicates', pairs.length);
        } catch (err) {
          el.innerHTML = `<p class="error">${escHtml(err.message)}</p>`;
        }
      }

      async function loadParkingSection() {
        const el = document.getElementById('parking-content');
        if (!el) return;
        try {
          const parks = await loadParkingLocations();
          // Seed the row data map so edits can access full attributes
          parkingRowData.clear();
          for (const p of parks) parkingRowData.set(p.id, p);
          el.innerHTML = renderParkingSection(parks);
        } catch (err) {
          el.innerHTML = `<p class="error">${escHtml(err.message)}</p>`;
        }
      }

      async function loadFlagsSection() {
        const el = document.getElementById('flags-content');
        if (!el) return;
        try {
          const flags = await loadParkFlags();
          el.innerHTML = renderFlags(flags);
          updateSummaryChip('summary-flags', flags.length);
        } catch (err) {
          el.innerHTML = `<p class="error">${escHtml(err.message)}</p>`;
        }
      }

      async function loadParksAndNamesSection(page = parksPage) {
        parksPage = page;
        const parksEl = document.getElementById('parks-content');
        const namesEl = document.getElementById('names-content');
        if (!parksEl || !namesEl) return;
        try {
          const [{ data: parks, count }, flagged] = await Promise.all([
            loadParks(page),
            loadFlaggedNames(),
          ]);
          namesEl.innerHTML = renderNames(flagged);
          parksEl.innerHTML = renderParks(parks, page, count);
          updateSummaryChip('summary-names', flagged.length);
        } catch (err) {
          const msg = `<p class="error">${escHtml(err.message)}</p>`;
          parksEl.innerHTML = msg;
          namesEl.innerHTML = msg;
        }
      }

      // ─── Event delegation ────────────────────────────────────────────────────

      document.addEventListener('click', e => {
        const chip = e.target.closest('[data-target-section]');
        if (chip) {
          const target = document.getElementById(chip.dataset.targetSection);
          if (target) {
            target.open = true;
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
          return;
        }
      });

      document.addEventListener('click', async e => {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;

        if (action === 'logout') { logout(); return; }

        if (action === 'collapse-all') {
          document.querySelectorAll('#main details[open]').forEach(d => { d.open = false; });
          return;
        }

        if (action === 'toggle-detail') {
          const parkId = btn.dataset.parkId;
          // For table rows, the detail row wraps the panel
          const detailRow = document.getElementById(`detail-row-${parkId}`);
          // For recently-updated cards / dup cards, the detail panel is a standalone div
          const panel = document.getElementById(`detail-${parkId}`)
            ?? document.getElementById(`detail-recent-${parkId}`);
          if (detailRow) {
            const visible = detailRow.style.display !== 'none';
            detailRow.style.display = visible ? 'none' : '';
            const origLabel = btn.dataset.label ?? btn.textContent;
            if (!btn.dataset.label) btn.dataset.label = origLabel;
            btn.textContent = visible ? origLabel : 'Hide';
          } else if (panel) {
            const visible = panel.style.display !== 'none';
            panel.style.display = visible ? 'none' : 'block';
          }
          return;
        }

        if (action === 'load-detail') {
          const parkId = btn.dataset.parkId;
          const detailRow = document.getElementById(`detail-row-park-${parkId}`);
          if (detailRow && detailRow.style.display !== 'none') {
            detailRow.style.display = 'none';
            btn.textContent = 'View';
            return;
          }
          btn.disabled = true;
          try {
            const park = await fetchParkDetail(parkId);
            const panelEl = document.getElementById(`detail-park-${parkId}`);
            if (panelEl) panelEl.innerHTML = renderParkDetail(park);
            if (detailRow) detailRow.style.display = '';
            btn.textContent = 'Hide';
            btn.dataset.action = 'toggle-detail';
            btn.dataset.parkId = `park-${parkId}`;
          } catch (err) {
            alert(err.message);
          }
          btn.disabled = false;
          return;
        }

        if (action === 'approve') {
          btn.disabled = true;
          try {
            await approvePhoto(btn.dataset.id);
            removePhotoCard(btn.dataset.id);
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'reject') {
          if (!confirm('Delete this photo and mark as rejected?')) return;
          btn.disabled = true;
          try {
            await rejectPhoto(btn.dataset.id, btn.dataset.path);
            removePhotoCard(btn.dataset.id);
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'accept-name' || action === 'dismiss-name') {
          btn.disabled = true;
          try {
            await markNameReviewed(btn.dataset.id);
            document.getElementById(`name-row-${btn.dataset.id}`)?.remove();
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'dismiss-flag') {
          if (!confirm('Dismiss this flag?')) return;
          btn.disabled = true;
          try {
            await dismissFlag(btn.dataset.id);
            flagRowData.delete(btn.dataset.id);
            document.getElementById(`flag-row-${btn.dataset.id}`)?.remove();
            if (!document.querySelector('#flags-body tr')) {
              document.getElementById('flags-content').innerHTML =
                '<p class="empty">No park flags.</p>';
            }
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'approve-flag' || action === 'unapprove-flag') {
          const id = btn.dataset.id;
          const flag = flagRowData.get(id);
          if (!flag) return;
          const newApproved = action === 'approve-flag';
          btn.disabled = true;
          try {
            await approveFlag(id, newApproved);
            flag.approved = newApproved;
            const row = document.getElementById(`flag-row-${id}`);
            if (row) row.outerHTML = renderFlagRow(flag);
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'edit-flag') {
          const id = btn.dataset.id;
          const flag = flagRowData.get(id);
          if (!flag) return;
          const row = document.getElementById(`flag-row-${id}`);
          if (row) {
            row.outerHTML = renderFlagRow(flag, true);
            document.getElementById(`edit-flag-reason-${id}`)?.focus();
          }
          return;
        }

        if (action === 'save-flag') {
          const id = btn.dataset.id;
          const flag = flagRowData.get(id);
          if (!flag) return;
          const reason = document.getElementById(`edit-flag-reason-${id}`)?.value ?? '';
          const categoryEl = document.getElementById(`edit-flag-category-${id}`);
          const category = categoryEl?.value ?? '';
          const errEl = document.getElementById(`flag-error-${id}`);
          btn.disabled = true;
          if (errEl) errEl.textContent = '';
          try {
            await updateFlagReason(id, reason, category);
            flag.reason = reason.trim();
            flag.category = category || null;
            const row = document.getElementById(`flag-row-${id}`);
            if (row) row.outerHTML = renderFlagRow(flag);
          } catch (err) {
            if (errEl) errEl.textContent = err.message;
            btn.disabled = false;
          }
          return;
        }

        if (action === 'cancel-flag') {
          const id = btn.dataset.id;
          const flag = flagRowData.get(id);
          if (!flag) return;
          const row = document.getElementById(`flag-row-${id}`);
          if (row) row.outerHTML = renderFlagRow(flag);
          return;
        }

        if (action === 'flag-remove-parking') {
          const id = btn.dataset.id;
          const parkId = btn.dataset.parkId;
          const flag = flagRowData.get(id);
          if (!flag || !flag.parks) return;
          const parkName = flag.parks.name ?? 'Unknown park';
          if (!confirm(`Remove the parking location for "${parkName}" and dismiss this flag?`)) return;
          btn.disabled = true;
          try {
            await removeParkingLocation(parkId, flag.parks.attributes);
            await dismissFlag(id);
            flagRowData.delete(id);
            document.getElementById(`flag-row-${id}`)?.remove();
            document.getElementById(`detail-row-flag-${id}`)?.remove();
            if (!document.querySelector('#flags-body tr')) {
              document.getElementById('flags-content').innerHTML =
                '<p class="empty">No park flags.</p>';
            }
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'flag-apply-parking') {
          const id = btn.dataset.id;
          const parkId = btn.dataset.parkId;
          const flag = flagRowData.get(id);
          if (!flag || !flag.parks) return;
          const lat = parseFloat(btn.dataset.lat);
          const lon = parseFloat(btn.dataset.lon);
          if (isNaN(lat) || isNaN(lon)) return;
          const parkName = flag.parks.name ?? 'Unknown park';
          if (!confirm(`Apply suggested parking location (${lat.toFixed(6)}, ${lon.toFixed(6)}) to "${parkName}" and dismiss this flag?`)) return;
          btn.disabled = true;
          try {
            const suggestion = parseParkingSuggestion(flag.reason);
            const existing = flag.parks.attributes?.parkingLocation ?? {};
            const parking = {
              latitude: lat.toString(),
              longitude: lon.toString(),
              address: existing.address ?? '',
              notes: suggestion?.detail || existing.notes || '',
            };
            await saveParkingLocation(parkId, flag.parks.attributes, parking);
            await dismissFlag(id);
            flagRowData.delete(id);
            document.getElementById(`flag-row-${id}`)?.remove();
            document.getElementById(`detail-row-flag-${id}`)?.remove();
            if (!document.querySelector('#flags-body tr')) {
              document.getElementById('flags-content').innerHTML =
                '<p class="empty">No park flags.</p>';
            }
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'not-duplicates') {
          btn.disabled = true;
          try {
            await markDuplicateReviewed(btn.dataset.idA, btn.dataset.idB);
            document.getElementById(`dup-${btn.dataset.idA}-${btn.dataset.idB}`)?.remove();
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'delete-park') {
          if (!confirm('Delete this park? This cannot be undone.')) return;
          btn.disabled = true;
          try {
            await deletePark(btn.dataset.id);
            document.getElementById(`dup-${btn.dataset.dupPair}`)?.remove();
            loadParksAndNamesSection();
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }

        if (action === 'edit-park') {
          const { id, name, lat, lng } = btn.dataset;
          const row = document.getElementById(`park-row-${id}`);
          if (row) {
            row.outerHTML = renderParkRow(
              { id, name, latitude: lat, longitude: lng }, true
            );
            document.getElementById(`edit-name-${id}`)?.focus();
          }
          return;
        }

        if (action === 'save-park') {
          const id = btn.dataset.id;
          const name = document.getElementById(`edit-name-${id}`)?.value ?? '';
          const lat  = document.getElementById(`edit-lat-${id}`)?.value ?? '';
          const lng  = document.getElementById(`edit-lng-${id}`)?.value ?? '';
          const errEl = document.getElementById(`park-error-${id}`);
          btn.disabled = true;
          errEl.textContent = '';
          try {
            await updatePark(id, name, lat, lng);
            loadParksAndNamesSection();
            loadRecentSection();
          } catch (err) { errEl.textContent = err.message; btn.disabled = false; }
          return;
        }

        if (action === 'cancel-park') {
          loadParksAndNamesSection();
          return;
        }

        if (action === 'parks-prev') {
          loadParksAndNamesSection(parksPage - 1);
          return;
        }

        if (action === 'parks-next') {
          loadParksAndNamesSection(parksPage + 1);
          return;
        }

        // ── Parking actions ──────────────────────────────────────────────────

        if (action === 'edit-parking') {
          const id = btn.dataset.id;
          const park = parkingRowData.get(id);
          if (!park) return;
          const row = document.getElementById(`parking-row-${id}`);
          if (row) {
            row.outerHTML = renderParkingRow(park, true);
            document.getElementById(`edit-pl-lat-${id}`)?.focus();
          }
          return;
        }

        if (action === 'save-parking') {
          const id = btn.dataset.id;
          const park = parkingRowData.get(id);
          if (!park) return;
          const lat   = document.getElementById(`edit-pl-lat-${id}`)?.value ?? '';
          const lng   = document.getElementById(`edit-pl-lng-${id}`)?.value ?? '';
          const addr  = document.getElementById(`edit-pl-addr-${id}`)?.value ?? '';
          const notes = document.getElementById(`edit-pl-notes-${id}`)?.value ?? '';
          const errEl = document.getElementById(`parking-error-${id}`);
          btn.disabled = true;
          errEl.textContent = '';
          try {
            await saveParkingLocation(id, park.attributes, { latitude: lat, longitude: lng, address: addr, notes });
            // Update local data and re-render row
            park.attributes.parkingLocation = {
              latitude: parseFloat(lat),
              longitude: parseFloat(lng),
              ...(addr.trim() ? { address: addr.trim() } : {}),
              ...(notes.trim() ? { notes: notes.trim() } : {}),
            };
            const row = document.getElementById(`parking-row-${id}`);
            if (row) row.outerHTML = renderParkingRow(park);
            loadRecentSection();
          } catch (err) {
            errEl.textContent = err.message;
            btn.disabled = false;
          }
          return;
        }

        if (action === 'cancel-parking') {
          const id = btn.dataset.id;
          const park = parkingRowData.get(id);
          if (!park) return;
          const row = document.getElementById(`parking-row-${id}`);
          if (row) row.outerHTML = renderParkingRow(park);
          return;
        }

        if (action === 'remove-parking') {
          const id = btn.dataset.id;
          const park = parkingRowData.get(id);
          if (!park) return;
          if (!confirm(`Remove the parking location for "${park.name}"?`)) return;
          btn.disabled = true;
          try {
            await removeParkingLocation(id, park.attributes);
            document.getElementById(`parking-row-${id}`)?.remove();
            parkingRowData.delete(id);
            if (!document.querySelector('#parking-body tr')) {
              document.getElementById('parking-content').innerHTML =
                '<p class="empty">No parking locations recorded yet.</p>';
            }
          } catch (err) { alert(err.message); btn.disabled = false; }
          return;
        }
      });

      // ─── Login form ──────────────────────────────────────────────────────────

      function bindLoginForm() {
        const btn = document.getElementById('login-btn');
        const errEl = document.getElementById('login-error');
        if (!btn) return;

        async function submit() {
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;
          btn.disabled = true;
          errEl.textContent = '';
          try {
            currentUser = await login(email, password);
            render();
            loadContent();
          } catch (err) {
            errEl.textContent = err.message;
            btn.disabled = false;
          }
        }

        btn.addEventListener('click', submit);
        document.getElementById('password').addEventListener('keydown', e => {
          if (e.key === 'Enter') submit();
        });
      }

      // ─── Utils ───────────────────────────────────────────────────────────────

      function updateSummaryChip(id, count) {
        const countEl = document.querySelector(`#${id} .summary-count`);
        if (!countEl) return;
        countEl.textContent = count;
        countEl.classList.remove('loading');
        countEl.classList.toggle('nonzero', count > 0);
        const badgeId = id.replace('summary-', 'badge-');
        const badgeEl = document.getElementById(badgeId);
        if (badgeEl) {
          badgeEl.textContent = count;
          badgeEl.classList.toggle('visible', count > 0);
        }
      }

      function removePhotoCard(id) {
        document.getElementById(`photo-${id}`)?.remove();
        if (!document.querySelector('.photo-card')) {
          const grid = document.querySelector('.photo-grid');
          if (grid) grid.outerHTML = '<p class="empty">No pending photos.</p>';
        }
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function escAttr(str) {
        return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
      }

      // ─── Init ────────────────────────────────────────────────────────────────

      db.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session && !currentUser) {
          currentUser = session.user;
          render();
          loadContent();
        }
      });

      const { data } = await db.auth.getSession();
      currentUser = data.session?.user ?? null;
      render();
      if (currentUser) loadContent();
    </script>
  </body>
</html>
